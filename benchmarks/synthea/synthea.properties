# Synthea settings for HAPI FHIR benchmark seed runs.
#
# scripts/lab passes patients, seed, and exporter.baseDirectory at runtime so
# each run remains deterministic and writes into an ignored run directory.
exporter.fhir.export = true
exporter.fhir.transaction_bundle = true
exporter.fhir.bulk_data = false
exporter.fhir.use_us_core_ig = false
exporter.years_of_history = 10
