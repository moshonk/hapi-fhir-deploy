apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: hapi-fhir-jpaserver
  namespace: fhir
  labels:
    app.kubernetes.io/name: hapi-fhir-jpaserver
    app.kubernetes.io/instance: hapi-fhir
    app.kubernetes.io/component: fhir-server
    app.kubernetes.io/part-of: hapi-fhir
  annotations:
    hapi-fhir-deploy.moshonk.dev/issue: "5"
    hapi-fhir-deploy.moshonk.dev/connection-budget: "floor((100 - 50) / 10) = 5"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hapi-fhir-hapi-fhir-jpaserver
  pollingInterval: 30
  cooldownPeriod: 300
  minReplicaCount: 2
  maxReplicaCount: 5
  advanced:
    horizontalPodAutoscalerConfig:
      name: hapi-fhir-jpaserver
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - type: Percent
              value: 50
              periodSeconds: 60
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Pods
              value: 1
              periodSeconds: 60
            - type: Percent
              value: 100
              periodSeconds: 60
          selectPolicy: Max
  triggers:
    - type: prometheus
      name: hapi-fhir-rps
      metricType: AverageValue
      metadata:
        serverAddress: http://prometheus-operated.monitoring.svc.cluster.local:9090
        query: sum(rate(http_server_requests_seconds_count{job="hapi-fhir-actuator"}[2m]))
        threshold: "5"
        ignoreNullValues: "false"
    - type: cpu
      name: hapi-fhir-cpu
      metricType: Utilization
      metadata:
        value: "70"
