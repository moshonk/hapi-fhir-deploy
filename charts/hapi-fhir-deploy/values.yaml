hapi-fhir-jpaserver:
  replicaCount: 2

  image:
    registry: docker.io
    repository: hapiproject/hapi
    tag: "v8.10.0-2@sha256:c5e53fb34bf39958c336837795f504673103f212e179ced14c8f7b96b585a182"
    pullPolicy: IfNotPresent

  postgres:
    enabled: false

  externalDatabase:
    host: hapi-fhir-postgres-rw.postgres.svc.cluster.local
    port: 5432
    user: hapi_fhir
    database: hapi_fhir
    existingSecret: hapi-fhir-postgres
    existingSecretKey: password

  extraEnv:
    - name: HAPI_FHIR_POSTGRES_JDBC_URL
      value: jdbc:postgresql://hapi-fhir-postgres-rw.postgres.svc.cluster.local:5432/hapi_fhir
    - name: HAPI_FHIR_POSTGRES_USERNAME
      value: hapi_fhir
    - name: HAPI_FHIR_POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: hapi-fhir-postgres
          key: password

  extraConfig: |
    spring:
      datasource:
        url: ${HAPI_FHIR_POSTGRES_JDBC_URL}
        username: ${HAPI_FHIR_POSTGRES_USERNAME}
        password: ${HAPI_FHIR_POSTGRES_PASSWORD}
        driverClassName: org.postgresql.Driver
        hikari:
          minimumIdle: 2
          maximumPoolSize: 10
      jpa:
        properties:
          hibernate.dialect: ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgresDialect
          hibernate.search.enabled: false
    management:
      endpoint:
        health:
          probes:
            enabled: true
      endpoints:
        web:
          exposure:
            include: health,prometheus

  resourcesPreset: none
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  readinessProbe:
    httpGet:
      path: /actuator/health/readiness
      port: http-metrics
    failureThreshold: 5
    initialDelaySeconds: 30
    periodSeconds: 20
    successThreshold: 1
    timeoutSeconds: 20

  livenessProbe:
    httpGet:
      path: /actuator/health/liveness
      port: http-metrics
    failureThreshold: 5
    initialDelaySeconds: 30
    periodSeconds: 20
    successThreshold: 1
    timeoutSeconds: 20

  startupProbe:
    httpGet:
      path: /actuator/health/readiness
      port: http-metrics
    failureThreshold: 20
    initialDelaySeconds: 30
    periodSeconds: 30
    successThreshold: 1
    timeoutSeconds: 20

  metrics:
    service:
      port: 8081
    serviceMonitor:
      enabled: true
      interval: 30s
      scrapeTimeout: 10s

  service:
    type: ClusterIP
    port: 8080

fhir-server-exporter:
  enabled: true
  fhirServerUrl: http://hapi-fhir-hapi-fhir-jpaserver:8080/fhir
  fhirServerName: hapi-fhir
  fetchIntervalSeconds: 300

  image:
    registry: ghcr.io
    repository: chgl/fhir-server-exporter
    tag: v3.0.15@sha256:d2f34aa65bc7e65de5073864d03907759979f477ed06460061d3eb9c23d64408
    pullPolicy: IfNotPresent

  resourcesPreset: none
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  serviceMonitor:
    enabled: true
    interval: 60s
    scrapeTimeout: 10s

  podDisruptionBudget:
    enabled: true
    minAvailable: 1
