name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-hapi-fhir-deployment:
    name: Validate HAPI FHIR deployment
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Set up Ansible
        run: |
          python3 -m pip install --user -r ansible/requirements.txt
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r ansible/requirements.yml

      - name: Parse YAML files
        run: |
          ruby -rpsych -e 'ARGV.each { |path| Psych.parse_stream(File.read(path)); puts "ok #{path}" }' \
            .github/workflows/ci.yml \
            charts/hapi-fhir-deploy/Chart.yaml \
            charts/hapi-fhir-deploy/values.yaml \
            manifests/namespace.yaml \
            manifests/autoscaling/hapi-fhir-scaledobject.yaml \
            manifests/runtime-rollout/hapi-fhir-deployment-rollout-patch.yaml \
            manifests/external-secrets/hapi-fhir-postgres.yaml

      - name: Parse Ansible YAML files
        run: |
          ruby -rpsych -e 'Dir["ansible/**/*.yml", "ansible/**/*.yaml"].sort.each { |path| Psych.parse_stream(File.read(path)); puts "ok #{path}" }'

      - name: Check lab CLI syntax
        run: |
          bash -n scripts/lab
          scripts/lab --help >/tmp/lab-help.txt
          scripts/lab seed --patients 1 --seed 123 --run ci-seed --dry-run >/tmp/lab-seed-dry-run.txt

      - name: Check Synthea loader
        run: |
          ruby -c scripts/synthea_loader.rb
          ruby scripts/synthea_loader.rb \
            --input test/fixtures/synthea \
            --metadata /tmp/synthea-loader-metadata.json \
            --patients 1 \
            --seed 123 \
            --run-id ci-seed \
            --metadata-only
          ruby -rjson -e 'm = JSON.parse(File.read("/tmp/synthea-loader-metadata.json")); abort "patient count mismatch" unless m.dig("synthea", "patients") == 1; abort "seed mismatch" unless m.dig("synthea", "seed") == 123; abort "Patient count mismatch" unless m.dig("synthea", "resource_counts", "Patient") == 1; abort "Observation count mismatch" unless m.dig("synthea", "resource_counts", "Observation") == 1; abort "unexpected import errors" unless m.dig("import", "error_count") == 0'
          ruby test/synthea_loader_http_test.rb

      - name: Check k6 benchmark profiles
        run: |
          FHIR_BASE_URL=http://example.invalid/fhir scripts/lab benchmark --profile smoke --run ci-benchmark --dry-run >/tmp/lab-benchmark-dry-run.txt
          node --check benchmarks/k6/lib/fhir_benchmark.js
          for profile in smoke baseline load stress; do
            node --check "benchmarks/k6/${profile}.js"
          done
          ruby <<'RUBY'
          expected_profiles = %w[smoke baseline load stress]
          missing = expected_profiles.reject { |profile| File.file?("benchmarks/k6/#{profile}.js") }
          abort "missing k6 profiles: #{missing.join(", ")}" unless missing.empty?

          common = File.read("benchmarks/k6/lib/fhir_benchmark.js")
          [
            "capability_statement",
            "patient_search",
            "patient_read",
            "observation_search",
            "encounter_search",
            "condition_search",
            "bulk_export",
            "p(50)",
            "p(95)",
            "p(99)",
            "http_req_failed",
            "fhir_health_success",
            "fhir_no_pod_restarts",
            "fhir_hikari_connection_headroom",
            "hikaricp_connections_active",
            "/$export"
          ].each do |expected|
            abort "k6 benchmark common module missing #{expected}" unless common.include?(expected)
          end

          expected_profiles.each do |profile|
            body = File.read("benchmarks/k6/#{profile}.js")
            abort "#{profile} profile does not export options" unless body.include?("profileOptions")
            abort "#{profile} profile does not run shared workload" unless body.include?("runFhirWorkload")
          end
          RUBY

      - name: Syntax-check Ansible playbooks
        run: ansible-playbook -i ansible/inventory.ini ansible/playbooks/lab.yml --syntax-check

      - name: Check Rev2 baseline decisions
        run: |
          ruby <<'RUBY'
          require "yaml"

          values = YAML.safe_load(
            File.read("charts/hapi-fhir-deploy/values.yaml"),
            permitted_classes: [],
            permitted_symbols: [],
            aliases: false
          )
          chart = values.fetch("hapi-fhir-jpaserver")
          namespace = YAML.safe_load(
            File.read("manifests/namespace.yaml"),
            permitted_classes: [],
            permitted_symbols: [],
            aliases: false
          )
          autoscaler = YAML.safe_load(
            File.read("manifests/autoscaling/hapi-fhir-scaledobject.yaml"),
            permitted_classes: [],
            permitted_symbols: [],
            aliases: false
          )
          rollout_patch = YAML.safe_load(
            File.read("manifests/runtime-rollout/hapi-fhir-deployment-rollout-patch.yaml"),
            permitted_classes: [],
            permitted_symbols: [],
            aliases: false
          )

          failures = []
          latest_tag = ->(tag) do
            tag_without_digest = tag.to_s.split("@", 2).first
            tag_without_digest.empty? || tag_without_digest == "latest" || tag_without_digest.end_with?(":latest")
          end

          failures << "embedded PostgreSQL must be disabled" unless chart.dig("postgres", "enabled") == false
          failures << "HAPI image must be pinned to reviewed v8.10.0-2 digest" unless chart.dig("image", "tag") == "v8.10.0-2@sha256:c5e53fb34bf39958c336837795f504673103f212e179ced14c8f7b96b585a182"
          failures << "external database secret must be hapi-fhir-postgres" unless chart.dig("externalDatabase", "existingSecret") == "hapi-fhir-postgres"
          failures << "external database secret key must be password" unless chart.dig("externalDatabase", "existingSecretKey") == "password"
          failures << "namespace manifest must not claim Helm ownership" if namespace.dig("metadata", "labels", "app.kubernetes.io/managed-by") == "helm"

          image_tag = chart.dig("image", "tag").to_s
          failures << "HAPI image tag must not be latest" if latest_tag.call(image_tag)
          failures << "HAPI image must be digest pinned" unless image_tag.include?("@sha256:")

          chart_dependencies = YAML.safe_load(
            File.read("charts/hapi-fhir-deploy/Chart.yaml"),
            permitted_classes: [],
            permitted_symbols: [],
            aliases: false
          ).fetch("dependencies")
          exporter_dependency = chart_dependencies.find { |dependency| dependency["name"] == "fhir-server-exporter" }
          failures << "fhir-server-exporter dependency must be pinned" unless exporter_dependency&.dig("version") == "1.2.35"

          failures << "HAPI ServiceMonitor must be enabled" unless chart.dig("metrics", "serviceMonitor", "enabled") == true
          failures << "readiness probe must use Actuator readiness" unless chart.dig("readinessProbe", "httpGet", "path") == "/actuator/health/readiness"
          failures << "liveness probe must use Actuator liveness" unless chart.dig("livenessProbe", "httpGet", "path") == "/actuator/health/liveness"
          failures << "HAPI PodDisruptionBudget must preserve one pod" unless chart.dig("podDisruptionBudget", "enabled") == true && chart.dig("podDisruptionBudget", "minAvailable") == 1

          env = Array(chart["extraEnv"]).to_h { |entry| [entry.fetch("name"), entry] }
          java_tool_options = env.dig("JAVA_TOOL_OPTIONS", "value").to_s
          [
            "-XX:MaxRAMPercentage=75",
            "-XX:+UseG1GC",
            "-XX:MaxGCPauseMillis=200"
          ].each do |expected|
            failures << "JAVA_TOOL_OPTIONS missing #{expected}" unless java_tool_options.include?(expected)
          end
          failures << "SERVER_SHUTDOWN must enable graceful shutdown" unless env.dig("SERVER_SHUTDOWN", "value") == "graceful"

          topology_spread = Array(chart["topologySpreadConstraints"])
          zone_spread = topology_spread.find { |constraint| constraint["topologyKey"] == "topology.kubernetes.io/zone" }
          failures << "HAPI topology spread constraint must target topology.kubernetes.io/zone" unless zone_spread
          if zone_spread
            failures << "HAPI topology spread maxSkew must be 1" unless zone_spread["maxSkew"] == 1
            failures << "HAPI topology spread must use ScheduleAnyway for single-zone fallback" unless zone_spread["whenUnsatisfiable"] == "ScheduleAnyway"
          end

          exporter = values.fetch("fhir-server-exporter")
          failures << "fhir-server-exporter must be enabled" unless exporter["enabled"] == true
          failures << "fhir-server-exporter ServiceMonitor must be enabled" unless exporter.dig("serviceMonitor", "enabled") == true
          exporter_image_tag = exporter.dig("image", "tag").to_s
          failures << "fhir-server-exporter image tag must not be latest" if latest_tag.call(exporter_image_tag)
          failures << "fhir-server-exporter image must be digest pinned" unless exporter_image_tag.include?("@sha256:")

          extra_config = chart.fetch("extraConfig")
          unless extra_config.is_a?(String)
            failures << "extraConfig must be a YAML string"
            extra_config = extra_config.to_s
          end

          parsed_extra_config = begin
            parsed = YAML.safe_load(
              extra_config,
              permitted_classes: [],
              permitted_symbols: [],
              aliases: false
            )
            if parsed.nil?
              {}
            elsif parsed.is_a?(Hash)
              parsed
            else
              failures << "extraConfig must parse as a YAML mapping"
              {}
            end
          rescue Psych::SyntaxError => e
            failures << "extraConfig must be valid YAML: #{e.message.lines.first.strip}"
            {}
          end
          hibernate_properties = parsed_extra_config.dig("spring", "jpa", "properties") || {}
          unless hibernate_properties.is_a?(Hash)
            failures << "spring.jpa.properties in extraConfig must parse as a YAML mapping"
            hibernate_properties = {}
          end
          search_enabled = hibernate_properties["hibernate.search.enabled"]
          search_backend_type = hibernate_properties["hibernate.search.backend.type"].to_s.downcase
          search_backend_hosts = hibernate_properties["hibernate.search.backend.hosts"].to_s.strip
          hikari_maximum_pool_size = parsed_extra_config.dig("spring", "datasource", "hikari", "maximumPoolSize").to_i
          shutdown_phase_timeout = parsed_extra_config.dig("spring", "lifecycle", "timeout-per-shutdown-phase").to_s

          [
            "spring:",
            "datasource:",
            "url: ${HAPI_FHIR_POSTGRES_JDBC_URL}",
            "username: ${HAPI_FHIR_POSTGRES_USERNAME}",
            "password: ${HAPI_FHIR_POSTGRES_PASSWORD}",
            "driverClassName: org.postgresql.Driver",
            "maximumPoolSize: 10",
            "management:",
            "probes:",
            "include: health,prometheus"
          ].each do |expected|
            failures << "extraConfig missing #{expected}" unless extra_config.include?(expected)
          end
          failures << "hibernate.search.enabled must be explicit" if search_enabled.nil?
          failures << "spring.lifecycle.timeout-per-shutdown-phase must be 30s" unless shutdown_phase_timeout == "30s"
          if [true, "true"].include?(search_enabled) && chart.fetch("replicaCount").to_i > 1
            shared_backend = ["elasticsearch", "opensearch"].include?(search_backend_type) && !search_backend_hosts.empty?
            failures << "Hibernate Search requires shared Elasticsearch/OpenSearch backend settings for multi-replica deployments" unless shared_backend
          end
          failures << "extraConfig must not reference H2" if extra_config.match?(/\bh2\b/i)

          patch_container = Array(rollout_patch.dig("spec", "template", "spec", "containers"))
            .find { |container| container["name"] == "hapi-fhir-jpaserver" }
          failures << "runtime rollout patch must set terminationGracePeriodSeconds >= 60" unless rollout_patch.dig("spec", "template", "spec", "terminationGracePeriodSeconds").to_i >= 60
          failures << "runtime rollout patch must set preStop sleep to 15 seconds" unless patch_container&.dig("lifecycle", "preStop", "sleep", "seconds") == 15

          postgres_max_connections = 100
          reserved_connections = 50
          failures << "Hikari maximumPoolSize must be greater than zero" unless hikari_maximum_pool_size.positive?
          replica_ceiling = hikari_maximum_pool_size.positive? ? (postgres_max_connections - reserved_connections) / hikari_maximum_pool_size : 0
          autoscaler_spec = autoscaler["spec"]
          unless autoscaler_spec.is_a?(Hash)
            failures << "HAPI autoscaler spec must be a YAML mapping"
            autoscaler_spec = {}
          end
          failures << "HAPI autoscaler must be a KEDA ScaledObject" unless autoscaler["apiVersion"] == "keda.sh/v1alpha1" && autoscaler["kind"] == "ScaledObject"
          failures << "HAPI autoscaler must live in fhir namespace" unless autoscaler.dig("metadata", "namespace") == "fhir"
          failures << "HAPI autoscaler must target hapi-fhir-hapi-fhir-jpaserver Deployment" unless autoscaler_spec.dig("scaleTargetRef", "kind") == "Deployment" && autoscaler_spec.dig("scaleTargetRef", "name") == "hapi-fhir-hapi-fhir-jpaserver"
          failures << "HAPI autoscaler minReplicaCount must be at least 2" unless autoscaler_spec["minReplicaCount"].to_i >= 2
          failures << "HAPI autoscaler maxReplicaCount must be set" unless autoscaler_spec.key?("maxReplicaCount")
          failures << "HAPI autoscaler maxReplicaCount must not exceed connection budget #{replica_ceiling}" unless autoscaler_spec["maxReplicaCount"].to_i <= replica_ceiling
          failures << "HAPI autoscaler cooldownPeriod must be at least 300 seconds" unless autoscaler_spec["cooldownPeriod"].to_i >= 300
          failures << "HAPI autoscaler scale-down stabilization must be at least 300 seconds" unless autoscaler_spec.dig("advanced", "horizontalPodAutoscalerConfig", "behavior", "scaleDown", "stabilizationWindowSeconds").to_i >= 300

          triggers = autoscaler_spec["triggers"]
          unless triggers.is_a?(Array)
            failures << "HAPI autoscaler triggers must be a YAML sequence"
            triggers = []
          end
          prometheus_trigger = triggers.find { |trigger| trigger["type"] == "prometheus" && trigger["name"] == "hapi-fhir-rps" }
          cpu_trigger = triggers.find { |trigger| trigger["type"] == "cpu" && trigger["name"] == "hapi-fhir-cpu" }
          failures << "HAPI autoscaler must include Prometheus RPS trigger" unless prometheus_trigger
          failures << "HAPI autoscaler must include CPU trigger" unless cpu_trigger
          if prometheus_trigger
            query = prometheus_trigger.dig("metadata", "query").to_s
            failures << "HAPI autoscaler Prometheus query must use http_server_requests_seconds_count rate over 2m" unless query.include?('rate(http_server_requests_seconds_count{job="hapi-fhir-actuator"}[2m])')
            failures << "HAPI autoscaler Prometheus threshold must be provisional 5 RPS per pod" unless prometheus_trigger.dig("metadata", "threshold") == "5"
            failures << "HAPI autoscaler Prometheus trigger must fail on null metrics" unless prometheus_trigger.dig("metadata", "ignoreNullValues") == "false"
          end
          if cpu_trigger
            failures << "HAPI autoscaler CPU trigger must target 70 percent utilization" unless cpu_trigger["metricType"] == "Utilization" && cpu_trigger.dig("metadata", "value") == "70"
          end

          indexing_memo = File.read("docs/indexing-strategy.md")
          [
            "Decision: Option A",
            "Operational complexity and cost",
            "Query consistency under replica scaling",
            "Performance considerations",
            "Security and data governance",
            "Migration path",
            "Rollback plan"
          ].each do |expected|
            failures << "indexing memo missing #{expected}" unless indexing_memo.include?(expected)
          end

          autoscaling_docs = File.read("docs/autoscaling.md").gsub(/\s+/, " ").strip
          [
            "maxReplicas <= floor((postgres_max_connections - reserved_connections) / hikari_maximum_pool_size)",
            "maxReplicas <= floor((100 - 50) / 10)",
            "maxReplicas <= 5",
            "provisional_per_pod_rps_threshold = 5",
            "PgBouncer transaction pooling is required"
          ].each do |expected|
            normalized_expected = expected.gsub(/\s+/, " ").strip
            failures << "autoscaling docs missing #{expected}" unless autoscaling_docs.include?(normalized_expected)
          end

          runtime_docs = File.read("docs/runtime-rollout.md").gsub(/\s+/, " ").strip
          [
            "-XX:MaxRAMPercentage=75 -XX:+UseG1GC -XX:MaxGCPauseMillis=200",
            "SERVER_SHUTDOWN=graceful",
            "spring.lifecycle.timeout-per-shutdown-phase=30s",
            "maximumPoolSize: 10",
            "maxReplicas <= floor((100 - 50) / 20)",
            "terminationGracePeriodSeconds: 60",
            "seconds: 15",
            "Kubernetes `1.30` or newer",
            "ScheduleAnyway"
          ].each do |expected|
            normalized_expected = expected.gsub(/\s+/, " ").strip
            failures << "runtime rollout docs missing #{expected}" unless runtime_docs.include?(normalized_expected)
          end

          readme = File.read("README.md").gsub(/\s+/, " ").strip
          [
            "D1: Kafka and Zookeeper are not part of the OSS starter architecture",
            "D2: HAPI FHIR is configured with explicit `spring.datasource.*` settings",
            "D3: Observability uses built-in Actuator and Micrometer",
            "D4: PostgreSQL support targets version `16` or `17` only",
            "D5: Charts, images, and workflow/tool versions are pinned",
            "D6: Hibernate Search remains disabled",
            "No scale-to-zero behavior",
            "No implicit embedded-Lucene indexing across multiple replicas",
            "HAPI chart | `hapifhir/hapi-fhir-jpaserver` chart `0.23.0`",
            "GitHub Actions Helm setup | `azure/setup-helm@v4`, Helm `v3.15.4`",
            "maxReplicas <= floor((100 - 50) / 10)",
            "Observability Checklist",
            "Rollback And Graceful Shutdown",
            "docs/runtime-rollout.md",
            "Kubernetes `1.30` or newer",
            "Scalable HAPI FHIR Kubernetes deployment baseline with external PostgreSQL"
          ].each do |expected|
            normalized_expected = expected.gsub(/\s+/, " ").strip
            failures << "README missing #{expected}" unless readme.include?(normalized_expected)
          end

          if failures.any?
            warn failures.map { |failure| "- #{failure}" }.join("\n")
            exit 1
          end
          RUBY

      - name: Build Helm dependencies
        run: helm dependency build charts/hapi-fhir-deploy

      - name: Lint Helm chart
        run: helm lint charts/hapi-fhir-deploy --values charts/hapi-fhir-deploy/values.yaml

      - name: Render Helm chart
        run: |
          helm template hapi-fhir charts/hapi-fhir-deploy \
            --namespace fhir \
            --values charts/hapi-fhir-deploy/values.yaml \
            > /tmp/hapi-fhir-rendered.yaml

      - name: Parse rendered manifests
        run: ruby -rpsych -e 'Psych.parse_stream(File.read("/tmp/hapi-fhir-rendered.yaml")); puts "ok rendered manifests"'

      - name: Validate Terraform benchmark lab modules
        run: |
          terraform fmt -check -recursive infra/terraform
          for module in infra/terraform/aws infra/terraform/azure infra/terraform/gcp; do
            terraform -chdir="$module" init -backend=false
            terraform -chdir="$module" validate
          done

      - name: Confirm datasource env and Secret references are rendered
        run: |
          ruby <<'RUBY'
          require "psych"

          def plain_yaml(node)
            case node
            when Psych::Nodes::Document
              plain_yaml(node.root)
            when Psych::Nodes::Mapping
              node.children.each_slice(2).to_h { |key, value| [plain_yaml(key), plain_yaml(value)] }
            when Psych::Nodes::Sequence
              node.children.map { |child| plain_yaml(child) }
            when Psych::Nodes::Scalar
              node.value
            when Psych::Nodes::Stream
              node.children.map { |child| plain_yaml(child) }
            when nil
              nil
            else
              abort "Unsupported YAML node: #{node.class}"
            end
          end

          documents = plain_yaml(Psych.parse_stream(File.read("/tmp/hapi-fhir-rendered.yaml"))).compact
          deployment = documents.find do |document|
            document["kind"] == "Deployment" &&
              document.dig("metadata", "name") == "hapi-fhir-hapi-fhir-jpaserver"
          end
          abort "HAPI FHIR Deployment was not rendered" unless deployment

          container = Array(deployment.dig("spec", "template", "spec", "containers"))
            .find { |candidate| candidate["name"] == "hapi-fhir-jpaserver" }
          abort "HAPI FHIR container was not rendered" unless container

          env = container.fetch("env").to_h { |entry| [entry.fetch("name"), entry] }
          expected_literals = {
            "SPRING_DATASOURCE_URL" => "jdbc:postgresql://hapi-fhir-postgres-rw.postgres.svc.cluster.local:5432/hapi_fhir?ApplicationName=hapi-fhir",
            "SPRING_DATASOURCE_USERNAME" => "hapi_fhir",
            "SPRING_DATASOURCE_DRIVERCLASSNAME" => "org.postgresql.Driver",
            "spring.jpa.properties.hibernate.dialect" => "ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgresDialect",
            "JAVA_TOOL_OPTIONS" => "-XX:MaxRAMPercentage=75 -XX:+UseG1GC -XX:MaxGCPauseMillis=200",
            "SERVER_SHUTDOWN" => "graceful"
          }
          failures = expected_literals.filter_map do |name, value|
            "#{name} must be rendered as #{value}" unless env.dig(name, "value") == value
          end

          password_ref = env.dig("SPRING_DATASOURCE_PASSWORD", "valueFrom", "secretKeyRef")
          unless password_ref == { "name" => "hapi-fhir-postgres", "key" => "password" }
            failures << "SPRING_DATASOURCE_PASSWORD must reference hapi-fhir-postgres/password"
          end

          topology_spread = Array(deployment.dig("spec", "template", "spec", "topologySpreadConstraints"))
          zone_spread = topology_spread.find { |constraint| constraint["topologyKey"] == "topology.kubernetes.io/zone" }
          failures << "rendered Deployment must include zone topology spread constraint" unless zone_spread

          if failures.any?
            warn failures.map { |failure| "- #{failure}" }.join("\n")
            exit 1
          end
          RUBY

      - name: Confirm bundled PostgreSQL is not rendered
        run: |
          if grep -Eq 'app.kubernetes.io/name: postgres' /tmp/hapi-fhir-rendered.yaml; then
            echo "Unexpected bundled PostgreSQL resources were rendered."
            exit 1
          fi

      - name: Confirm excluded Rev2 resources are not rendered
        run: |
          if grep -Eiq '\b(kafka|zookeeper)\b' /tmp/hapi-fhir-rendered.yaml; then
            echo "Unexpected Kafka or Zookeeper resources were rendered."
            exit 1
          fi
          if grep -Eiq '\bh2\b' /tmp/hapi-fhir-rendered.yaml; then
            echo "Unexpected H2 configuration was rendered."
            exit 1
          fi
