name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-hapi-fhir-deployment:
    name: Validate HAPI FHIR deployment
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Parse YAML files
        run: |
          ruby -rpsych -e 'ARGV.each { |path| Psych.parse_stream(File.read(path)); puts "ok #{path}" }' \
            .github/workflows/ci.yml \
            charts/hapi-fhir-deploy/Chart.yaml \
            charts/hapi-fhir-deploy/values.yaml \
            manifests/namespace.yaml \
            manifests/external-secrets/hapi-fhir-postgres.yaml

      - name: Check Rev2 baseline decisions
        run: |
          ruby <<'RUBY'
          require "yaml"

          values = YAML.safe_load(
            File.read("charts/hapi-fhir-deploy/values.yaml"),
            permitted_classes: [],
            permitted_symbols: [],
            aliases: false
          )
          chart = values.fetch("hapi-fhir-jpaserver")
          namespace = YAML.safe_load(
            File.read("manifests/namespace.yaml"),
            permitted_classes: [],
            permitted_symbols: [],
            aliases: false
          )

          failures = []
          failures << "embedded PostgreSQL must be disabled" unless chart.dig("postgres", "enabled") == false
          failures << "HAPI image must be pinned to reviewed v8.10.0-2 digest" unless chart.dig("image", "tag") == "v8.10.0-2@sha256:c5e53fb34bf39958c336837795f504673103f212e179ced14c8f7b96b585a182"
          failures << "external database secret must be hapi-fhir-postgres" unless chart.dig("externalDatabase", "existingSecret") == "hapi-fhir-postgres"
          failures << "external database secret key must be password" unless chart.dig("externalDatabase", "existingSecretKey") == "password"
          failures << "namespace manifest must not claim Helm ownership" if namespace.dig("metadata", "labels", "app.kubernetes.io/managed-by") == "helm"

          image_tag = chart.dig("image", "tag").to_s
          failures << "HAPI image tag must not be latest" if image_tag.empty? || image_tag == "latest" || image_tag.end_with?(":latest")
          failures << "HAPI image must be digest pinned" unless image_tag.include?("@sha256:")

          chart_dependencies = YAML.safe_load(
            File.read("charts/hapi-fhir-deploy/Chart.yaml"),
            permitted_classes: [],
            permitted_symbols: [],
            aliases: false
          ).fetch("dependencies")
          exporter_dependency = chart_dependencies.find { |dependency| dependency["name"] == "fhir-server-exporter" }
          failures << "fhir-server-exporter dependency must be pinned" unless exporter_dependency&.dig("version") == "1.2.35"

          failures << "HAPI ServiceMonitor must be enabled" unless chart.dig("metrics", "serviceMonitor", "enabled") == true
          failures << "readiness probe must use Actuator readiness" unless chart.dig("readinessProbe", "httpGet", "path") == "/actuator/health/readiness"
          failures << "liveness probe must use Actuator liveness" unless chart.dig("livenessProbe", "httpGet", "path") == "/actuator/health/liveness"

          exporter = values.fetch("fhir-server-exporter")
          failures << "fhir-server-exporter must be enabled" unless exporter["enabled"] == true
          failures << "fhir-server-exporter ServiceMonitor must be enabled" unless exporter.dig("serviceMonitor", "enabled") == true
          exporter_image_tag = exporter.dig("image", "tag").to_s
          failures << "fhir-server-exporter image tag must not be latest" if exporter_image_tag.empty? || exporter_image_tag == "latest" || exporter_image_tag.end_with?(":latest")
          failures << "fhir-server-exporter image must be digest pinned" unless exporter_image_tag.include?("@sha256:")

          extra_config = chart.fetch("extraConfig")
          [
            "spring:",
            "datasource:",
            "url: ${HAPI_FHIR_POSTGRES_JDBC_URL}",
            "username: ${HAPI_FHIR_POSTGRES_USERNAME}",
            "password: ${HAPI_FHIR_POSTGRES_PASSWORD}",
            "driverClassName: org.postgresql.Driver",
            "maximumPoolSize: 10",
            "hibernate.search.enabled:",
            "management:",
            "probes:",
            "include: health,prometheus"
          ].each do |expected|
            failures << "extraConfig missing #{expected}" unless extra_config.include?(expected)
          end
          failures << "extraConfig must not reference H2" if extra_config.match?(/\bh2\b/i)

          if failures.any?
            warn failures.map { |failure| "- #{failure}" }.join("\n")
            exit 1
          end
          RUBY

      - name: Build Helm dependencies
        run: helm dependency build charts/hapi-fhir-deploy

      - name: Lint Helm chart
        run: helm lint charts/hapi-fhir-deploy --values charts/hapi-fhir-deploy/values.yaml

      - name: Render Helm chart
        run: |
          helm template hapi-fhir charts/hapi-fhir-deploy \
            --namespace fhir \
            --values charts/hapi-fhir-deploy/values.yaml \
            > /tmp/hapi-fhir-rendered.yaml

      - name: Parse rendered manifests
        run: ruby -rpsych -e 'Psych.parse_stream(File.read("/tmp/hapi-fhir-rendered.yaml")); puts "ok rendered manifests"'

      - name: Confirm datasource env and Secret references are rendered
        run: |
          grep -q 'name: SPRING_DATASOURCE_URL' /tmp/hapi-fhir-rendered.yaml
          grep -q 'name: SPRING_DATASOURCE_USERNAME' /tmp/hapi-fhir-rendered.yaml
          grep -q 'name: SPRING_DATASOURCE_PASSWORD' /tmp/hapi-fhir-rendered.yaml
          grep -q 'secretKeyRef:' /tmp/hapi-fhir-rendered.yaml
          grep -q 'name: hapi-fhir-postgres' /tmp/hapi-fhir-rendered.yaml
          grep -q 'key: password' /tmp/hapi-fhir-rendered.yaml

      - name: Confirm bundled PostgreSQL is not rendered
        run: |
          if grep -Eq 'app.kubernetes.io/name: postgres' /tmp/hapi-fhir-rendered.yaml; then
            echo "Unexpected bundled PostgreSQL resources were rendered."
            exit 1
          fi

      - name: Confirm excluded Rev2 resources are not rendered
        run: |
          if grep -Eiq '\b(kafka|zookeeper)\b' /tmp/hapi-fhir-rendered.yaml; then
            echo "Unexpected Kafka or Zookeeper resources were rendered."
            exit 1
          fi
          if grep -Eiq '\bh2\b' /tmp/hapi-fhir-rendered.yaml; then
            echo "Unexpected H2 configuration was rendered."
            exit 1
          fi
